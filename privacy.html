<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BusGasteiz</title>
    <script>
        (function () {
            var langs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'es'];
            var supported = ['eu', 'es', 'en'];
            var chosen = 'es';
            for (var i = 0; i < langs.length; i++) {
                var l = langs[i].toLowerCase().split('-')[0];
                if (supported.indexOf(l) !== -1) { chosen = l; break; }
            }
            window.location.replace(chosen + '/privacy.html');
        })();
    </script>
</head>
<body></body>
</html>
