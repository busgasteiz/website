<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BusGasteiz</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --subtle: #6e6e73;
            --radius: 22.37%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 3rem 1.5rem;
            text-align: center;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .icon {
            width: 120px;
            height: 120px;
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
        }

        h1 {
            font-size: clamp(1.75rem, 6vw, 2.25rem);
            font-weight: 700;
            line-height: 1.2;
        }

        p.description {
            font-size: clamp(1.125rem, 4vw, 1.375rem);
            font-weight: 400;
            line-height: 1.5;
            max-width: 36rem;
            color: var(--text);
        }

        footer {
            padding: 1.5rem;
            font-size: .8125rem;
            color: var(--subtle);
            text-align: center;
        }

        .mobile-break {
            display: none;
        }

        @media (max-width: 480px) {
            .mobile-break {
                display: block;
            }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            body {
                justify-content: space-between;
            }

            main {
                flex-direction: row;
                align-items: center;
                padding: 1.5rem 2rem;
                gap: 2rem;
                width: 100%;
            }

            .hero {
                flex: 1;
                justify-content: center;
            }

            .icon {
                width: 80px;
                height: 80px;
            }

            p.description {
                flex: 1;
                font-size: 1rem;
                max-width: none;
            }

            footer {
                width: 100%;
                padding: 0.5rem 1.5rem calc(0.5rem + env(safe-area-inset-bottom));
                font-size: .6875rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="hero">
            <img class="icon" src="icon.png" alt="Icono de BusGasteiz">
            <h1>BusGasteiz</h1>
        </div>
        <p class="description">Visualizador de la información en tiempo real de los autobuses urbanos y tranvía de Vitoria-Gasteiz.</p>
    </main>
    <footer>
        <p>© 2026 Ion Jaureguialzo Sarasola.<br class="mobile-break"> Todos los derechos reservados.</p>
    </footer>
</body>
</html>
