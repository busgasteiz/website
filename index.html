<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusGasteiz</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --subtle: #6e6e73;
            --radius: 22.37%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 3rem 1.5rem;
            text-align: center;
        }

        .icon {
            width: 120px;
            height: 120px;
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
        }

        h1 {
            font-size: clamp(1.125rem, 4vw, 1.375rem);
            font-weight: 400;
            line-height: 1.5;
            max-width: 28rem;
            color: var(--text);
        }

        footer {
            padding: 1.5rem;
            font-size: .8125rem;
            color: var(--subtle);
        }
    </style>
</head>
<body>
    <main>
        <img class="icon" src="icon.png" alt="Icono de BusGasteiz">
        <h1>Visualizador de la información en tiempo real de los autobuses urbanos y tranvía de Vitoria-Gasteiz.</h1>
    </main>
    <footer>
        <p>Copyright 2026 Ion Jaureguialzo Sarasola</p>
    </footer>
</body>
</html>
